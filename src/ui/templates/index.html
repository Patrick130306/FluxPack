<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxPack</title>
<style>
/* ══ Reset & Base ═══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #1f6feb;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --orange: #d4760a;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ══ Header ════════════════════════════════════════ */
.header {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2333 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #58a6ff, #a371f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .sub { color: var(--text2); font-size: 13px; }
.header .status { font-size: 12px; color: var(--green); }
.header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ══ Layout ════════════════════════════════════════ */
.container { display: flex; height: calc(100vh - 58px); }

/* Sidebar */
.sidebar {
  width: 200px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 12px 0;
  flex-shrink: 0;
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 20px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  transition: all .15s;
  text-align: left;
}
.tab-btn:hover { background: var(--bg3); color: var(--text); }
.tab-btn.active { background: var(--bg3); color: var(--accent); border-right: 2px solid var(--accent); }
.tab-btn .icon { font-size: 18px; width: 24px; text-align: center; }

/* Main */
.main { flex: 1; overflow-y: auto; padding: 24px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-content h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
.tab-content h2 small { font-size: 13px; color: var(--text2); font-weight: 400; }

/* ══ Cards ════════════════════════════════════════ */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.card-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.card-row:last-child { margin-bottom: 0; }

/* ══ Form Controls ═══════════════════════════════ */
input, select, textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  transition: border .15s;
  width: 100%;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input[type="file"] { display: none; }
label.file-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--bg3);
  border: 1px dashed var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all .15s;
}
label.file-label:hover { border-color: var(--accent); color: var(--accent); }

/* ══ Buttons ═════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-success { background: var(--green); border-color: var(--green); color: #fff; }
.btn-success:hover { opacity: .85; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ══ Table ═══════════════════════════════════════ */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  background: var(--bg3);
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }

/* ══ Progress ════════════════════════════════════ */
.progress-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 3px;
  transition: width .3s;
  width: 0%;
}
.progress-text { font-size: 12px; color: var(--text2); font-variant-numeric: tabular-nums; }

/* ══ Output / Log ═══════════════════════════════ */
.log {
  background: #010409;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.log .ok { color: var(--green); }
.log .err { color: var(--red); }
.log .info { color: var(--accent); }
.log .warn { color: var(--yellow); }

/* ══ File Browser ═══════════════════════════════ */
.file-browser { border: 1px solid var(--border); border-radius: var(--radius); max-height: 260px; overflow-y: auto; }
.file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.file-item:last-child { border-bottom: none; }
.file-item:hover { background: var(--bg3); }
.file-item .icon { font-size: 16px; width: 20px; }
.file-item .fname { flex: 1; }
.file-item .fsize { color: var(--text2); font-size: 11px; }
.file-item.back { color: var(--accent); }

/* ══ Misc ═══════════════════════════════════════ */
.flex { display: flex; gap: 8px; align-items: center; }
.flex-1 { flex: 1; }
.gap { gap: 12px; }
.mt { margin-top: 12px; }
.mt2 { margin-top: 20px; }
.mb { margin-bottom: 12px; }
.text-center { text-align: center; }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-accent { color: var(--accent); }
.text-muted { color: var(--text2); }
.text-sm { font-size: 12px; }

/* ══ Toast ══════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 20px; border-radius: var(--radius);
  color: #fff; font-size: 13px; z-index: 9999;
  transform: translateY(120%); opacity: 0;
  transition: all .3s;
  max-width: 400px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
.toast.info { background: var(--accent2); }

/* ══ Responsive ═════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { width: 56px; }
  .sidebar .tab-btn span { display: none; }
  .container { flex-direction: column; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<!-- ══ Header ═════════════════════════════════════ -->
<div class="header">
  <div class="flex gap">
    <h1>⚡ FluxPack</h1>
    <span class="sub">压缩包管理工具</span>
  </div>
  <div class="status"><span class="dot"></span>服务运行中</div>
</div>

<!-- ══ Body ═══════════════════════════════════════ -->
<div class="container">

  <!-- Sidebar -->
  <nav class="sidebar">
    <button class="tab-btn active" data-tab="dashboard"><span class="icon">🏠</span><span>首页</span></button>
    <button class="tab-btn" data-tab="compress"><span class="icon">📦</span><span>压缩</span></button>
    <button class="tab-btn" data-tab="extract"><span class="icon">📂</span><span>解压</span></button>
    <button class="tab-btn" data-tab="list"><span class="icon">📋</span><span>浏览</span></button>
    <button class="tab-btn" data-tab="crack"><span class="icon">🔓</span><span>破解</span></button>
    <button class="tab-btn" data-tab="convert"><span class="icon">🔄</span><span>转换</span></button>
    <button class="tab-btn" data-tab="test"><span class="icon">✅</span><span>校验</span></button>
  </nav>

  <!-- Main Content -->
  <main class="main">

    <!-- ══ Dashboard ════════════════════════════ -->
    <div class="tab-content active" id="tab-dashboard">
      <h2>🏠 首页 <small>快速操作</small></h2>
      <div class="card">
        <div class="card-title">快速开始</div>
        <p class="text-muted mb">选择一个压缩包开始操作，或者创建一个新的压缩包。</p>
        <div class="card-row">
          <input type="text" id="dash-path" placeholder="输入压缩包路径或点击浏览..." class="flex-1">
          <button class="btn" onclick="browseDialog('dash-path')">📂 浏览</button>
          <button class="btn btn-primary" onclick="dashOpen()">打开</button>
        </div>
        <div class="card-row">
          <button class="btn" onclick="switchTab('compress')">📦 创建压缩包</button>
          <button class="btn" onclick="switchTab('extract')">📂 解压</button>
          <button class="btn" onclick="switchTab('crack')">🔓 破解密码</button>
          <button class="btn" onclick="switchTab('convert')">🔄 格式转换</button>
        </div>
      </div>
      <div id="dash-result"></div>
    </div>

    <!-- ══ Compress ═════════════════════════════ -->
    <div class="tab-content" id="tab-compress">
      <h2>📦 压缩 <small>创建加密/分卷压缩包</small></h2>
      <div class="card">
        <div class="card-title">源文件</div>
        <div class="card-row">
          <input type="text" id="cmp-sources" placeholder="文件或文件夹路径（多个用逗号分隔）" class="flex-1">
          <button class="btn" onclick="browseDialog('cmp-sources', true)">📂 浏览文件</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">目标设置</div>
        <div class="card-row">
          <div style="flex:2"><label class="text-sm text-muted">输出路径</label><input type="text" id="cmp-output" placeholder="如: D:/archive.7z"></div>
          <div style="flex:1"><label class="text-sm text-muted">格式</label>
            <select id="cmp-format"><option value="">自动检测</option><option value="zip">ZIP</option><option value="7z" selected>7Z</option><option value="tar.gz">TAR.GZ</option><option value="tar">TAR</option></select>
          </div>
        </div>
        <div class="card-row">
          <div style="flex:1"><label class="text-sm text-muted">密码（可选）</label><input type="password" id="cmp-password" placeholder="留空则不加密"></div>
          <div style="flex:1"><label class="text-sm text-muted">分卷大小（可选）</label><input type="text" id="cmp-volume" placeholder="如: 10M, 1G"></div>
        </div>
        <button class="btn btn-primary mt" onclick="doCompress()">⚡ 开始压缩</button>
      </div>
      <div id="cmp-result"></div>
    </div>

    <!-- ══ Extract ═══════════════════════════════ -->
    <div class="tab-content" id="tab-extract">
      <h2>📂 解压 <small>支持密码解压</small></h2>
      <div class="card">
        <div class="card-title">解压设置</div>
        <div class="card-row">
          <input type="text" id="ext-path" placeholder="压缩包路径" class="flex-1">
          <button class="btn" onclick="browseDialog('ext-path')">📂 浏览</button>
        </div>
        <div class="card-row">
          <div style="flex:1"><label class="text-sm text-muted">密码（可选）</label><input type="password" id="ext-password" placeholder="有密码则输入"></div>
          <div style="flex:1"><label class="text-sm text-muted">输出目录（可选）</label><input type="text" id="ext-target" placeholder="默认: 同目录下同名文件夹"></div>
        </div>
        <button class="btn btn-primary mt" onclick="doExtract()">📂 开始解压</button>
      </div>
      <div id="ext-result"></div>
    </div>

    <!-- ══ List/Browse ═══════════════════════════ -->
    <div class="tab-content" id="tab-list">
      <h2>📋 浏览 <small>查看压缩包内容</small></h2>
      <div class="card">
        <div class="card-row">
          <input type="text" id="list-path" placeholder="压缩包路径" class="flex-1">
          <button class="btn" onclick="browseDialog('list-path')">📂 浏览</button>
          <input type="password" id="list-password" placeholder="密码（可选）" style="width:140px">
          <button class="btn btn-primary" onclick="doList()">📋 查看</button>
        </div>
      </div>
      <div id="list-result"></div>
    </div>

    <!-- ══ Crack ═════════════════════════════════ -->
    <div class="tab-content" id="tab-crack">
      <h2>🔓 密码破解 <small>字典 / 暴力 / 智能 / 掩码</small></h2>
      <div class="card">
        <div class="card-title">破解设置</div>
        <div class="card-row">
          <input type="text" id="crk-path" placeholder="加密压缩包路径" class="flex-1">
          <button class="btn" onclick="browseDialog('crk-path')">📂 浏览</button>
        </div>
        <div class="card-row">
          <div style="flex:1"><label class="text-sm text-muted">破解方法</label>
            <select id="crk-method"><option value="smart">智能模式（推荐）</option><option value="dict">字典攻击</option><option value="brute">暴力破解</option><option value="mask">掩码攻击</option></select>
          </div>
          <div style="flex:1"><label class="text-sm text-muted">字典文件（字典模式）</label><input type="text" id="crk-wordlist" placeholder="路径或留空用内置字典"></div>
        </div>
        <div id="crk-advanced" style="display:none">
          <div class="card-row">
            <div style="flex:1"><label class="text-sm text-muted">字符集</label><input type="text" id="crk-charset" value="0123456789" placeholder="如: abc012"></div>
            <div style="flex:1"><label class="text-sm text-muted">掩码（多行用逗号分隔）</label><input type="text" id="crk-masks" placeholder="?l?l?d?d, ?u?l?l?l?d?d"></div>
          </div>
          <div class="card-row">
            <div style="flex:1"><label class="text-sm text-muted">最小长度</label><input type="number" id="crk-minlen" value="1"></div>
            <div style="flex:1"><label class="text-sm text-muted">最大长度</label><input type="number" id="crk-maxlen" value="6"></div>
            <div style="flex:1"><label class="text-sm text-muted">线程数</label><input type="number" id="crk-workers" value="4"></div>
          </div>
        </div>
        <div class="card-row mt">
          <button class="btn btn-danger" onclick="doCrack()">🔓 开始破解</button>
          <button class="btn" onclick="stopCrack()">⏹ 停止</button>
          <span class="text-sm text-muted" style="margin-left:8px">掩码符号: ?l=小写 ?u=大写 ?d=数字 ?s=特殊 ?a=所有</span>
        </div>
      </div>
      <div id="crk-progress" style="display:none">
        <div class="card">
          <div class="card-title">破解进度</div>
          <div class="progress-bar"><div class="progress-fill" id="crk-pbar"></div></div>
          <div class="progress-text" id="crk-pstat">初始化...</div>
        </div>
      </div>
      <div id="crk-result"></div>
    </div>

    <!-- ══ Convert ═══════════════════════════════ -->
    <div class="tab-content" id="tab-convert">
      <h2>🔄 格式转换</h2>
      <div class="card">
        <div class="card-title">转换设置</div>
        <div class="card-row">
          <div style="flex:1"><label class="text-sm text-muted">源文件</label><input type="text" id="cv-src" placeholder="源压缩包"><button class="btn" onclick="browseDialog('cv-src')" style="margin-top:4px">📂</button></div>
          <div style="flex:1"><label class="text-sm text-muted">目标文件</label><input type="text" id="cv-dst" placeholder="如: output.7z"></div>
        </div>
        <div class="card-row">
          <div style="flex:1"><label class="text-sm text-muted">源密码</label><input type="password" id="cv-srcpwd" placeholder="可选"></div>
          <div style="flex:1"><label class="text-sm text-muted">目标密码</label><input type="password" id="cv-dstpwd" placeholder="可选"></div>
        </div>
        <button class="btn btn-primary mt" onclick="doConvert()">🔄 开始转换</button>
      </div>
      <div id="cv-result"></div>
    </div>

    <!-- ══ Test ══════════════════════════════════ -->
    <div class="tab-content" id="tab-test">
      <h2>✅ 完整性校验</h2>
      <div class="card">
        <div class="card-row">
          <input type="text" id="tst-path" placeholder="压缩包路径" class="flex-1">
          <button class="btn" onclick="browseDialog('tst-path')">📂 浏览</button>
          <input type="password" id="tst-password" placeholder="密码（可选）" style="width:140px">
          <button class="btn btn-primary" onclick="doTest()">✅ 校验</button>
        </div>
      </div>
      <div id="tst-result"></div>
      <div class="card mt2">
        <div class="card-title">批量校验</div>
        <div class="card-row">
          <input type="text" id="tst-batch" placeholder="通配符模式，如: D:/archives/*.7z" class="flex-1">
          <button class="btn btn-primary" onclick="doBatchTest()">批量校验</button>
        </div>
        <div id="tst-batch-result"></div>
      </div>
    </div>

  </main>
</div>

<!-- ══ File Browser Modal ═══════════════════════ -->
<div id="browser-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center" onclick="if(event.target===this)closeBrowser()">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:600px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:600">📂 文件浏览器</span>
      <button class="btn" onclick="closeBrowser()" style="padding:4px 10px">✕</button>
    </div>
    <div style="padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px">
      <input type="text" id="browser-path" style="flex:1" readonly>
      <button class="btn" onclick="browserGoUp()">⬆ 上级</button>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer">
        <input type="checkbox" id="browser-hidden" onchange="browserRefresh()"> 显示隐藏
      </label>
    </div>
    <div id="browser-list" style="flex:1;overflow-y:auto;min-height:200px"></div>
    <div style="padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeBrowser()">取消</button>
      <button class="btn btn-primary" onclick="browserSelect()">选择</button>
    </div>
  </div>
</div>

<!-- ══ Toast ════════════════════════════════════ -->
<div id="toast" class="toast"></div>

<script>
// ══ Tab Switching ══════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
}
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ══ Crack method switch ════════════════════════════
document.getElementById('crk-method').addEventListener('change', function() {
  const adv = document.getElementById('crk-advanced');
  adv.style.display = (this.value === 'brute' || this.value === 'mask') ? 'block' : 'none';
});

// ══ Toast ══════════════════════════════════════════
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ══ File Browser ══════════════════════════════════
let _browserTarget = null;
let _browserMulti = false;
let _browserCurrent = '';
let _browserSelected = null;

function browseDialog(targetId, multi=false) {
  _browserTarget = targetId;
  _browserMulti = multi;
  document.getElementById('browser-modal').style.display = 'flex';
  browserGoTo('C:\\');
}
function closeBrowser() {
  document.getElementById('browser-modal').style.display = 'none';
}
function browserGoTo(path) {
  fetch('/api/browse', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      path: path,
      show_hidden: document.getElementById('browser-hidden').checked
    })
  }).then(r => r.json()).then(data => {
    if (data.error) { showToast(data.error, 'error'); return; }
    _browserCurrent = data.current;
    document.getElementById('browser-path').value = data.current;
    const list = document.getElementById('browser-list');
    list.innerHTML = '';
    if (data.parent) {
      const div = document.createElement('div');
      div.className = 'file-item back';
      div.innerHTML = '<span class="icon">📁</span><span class="fname">..</span>';
      div.onclick = () => browserGoTo(data.parent);
      list.appendChild(div);
    }
    _browserSelected = null;
    data.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'file-item';
      if (item.is_dir) {
        div.innerHTML = `<span class="icon">📁</span><span class="fname">${item.name}</span>`;
        div.onclick = () => browserGoTo(item.path);
      } else {
        const icon = item.is_archive ? '📦' : '📄';
        div.innerHTML = `<span class="icon">${icon}</span><span class="fname">${item.name}</span><span class="fsize">${fmtSize(item.size)}</span>`;
        div.onclick = () => {
          _browserSelected = item.path;
          document.querySelectorAll('.file-item').forEach(el => el.style.background = '');
          div.style.background = 'var(--bg3)';
        };
      }
      list.appendChild(div);
    });
  });
}
function browserRefresh() { browserGoTo(_browserCurrent); }
function browserGoUp() {
  const parts = _browserCurrent.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 1) return;
  const parent = parts.slice(0, -1).join('\\');
  browserGoTo(parent.startsWith('C:') ? parent : 'C:\\' + parent);
}
function browserSelect() {
  if (!_browserTarget) return;
  const input = document.getElementById(_browserTarget);
  if (_browserSelected) {
    input.value = _browserSelected;
  } else {
    input.value = _browserCurrent;
  }
  closeBrowser();
}

// ══ API helpers ════════════════════════════════════
async function apiPost(url, data) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  return await r.json();
}

function fmtSize(bytes) {
  if (!bytes || bytes === 0) return '-';
  for (const unit of ['B', 'KB', 'MB', 'GB', 'TB']) {
    if (bytes < 1024) return bytes.toFixed(1) + ' ' + unit;
    bytes /= 1024;
  }
  return bytes.toFixed(1) + ' PB';
}

// ══ Dashboard ══════════════════════════════════════
function dashOpen() {
  const path = document.getElementById('dash-path').value;
  if (!path) { showToast('请输入压缩包路径', 'error'); return; }
  switchTab('list');
  document.getElementById('list-path').value = path;
  doList();
}

// ══ List ═══════════════════════════════════════════
async function doList() {
  const path = document.getElementById('list-path').value;
  const password = document.getElementById('list-password').value || null;
  if (!path) { showToast('请输入压缩包路径', 'error'); return; }

  const el = document.getElementById('list-result');
  el.innerHTML = '<div class="card"><div class="text-center text-muted">⏳ 加载中...</div></div>';

  const data = await apiPost('/api/list', {path, password});
  if (data.error) {
    el.innerHTML = `<div class="card"><span class="text-red">❌ ${data.error}</span></div>`;
    return;
  }

  const info = data.info;
  let html = `<div class="card">
    <div class="card-title">📦 ${data.name}</div>
    <div class="text-sm text-muted mb">
      格式: <span class="text-accent">${info.format}</span> |
      文件: ${info.file_count} |
      原始: ${fmtSize(info.total_raw)} |
      压缩后: ${fmtSize(info.total_compressed)} |
      压缩率: ${info.ratio.toFixed(1)}%
      ${info.supports_password ? '| 🔒 支持密码' : ''}
      ${info.supports_volumes ? '| 📦 支持分卷' : ''}
    </div>`;

  if (data.entries.length === 0) {
    html += '<div class="text-muted">（空）</div>';
  } else {
    html += '<div class="table-wrap"><table><tr><th>文件名</th><th>类型</th><th>大小</th><th>压缩后</th><th>压缩比</th><th>CRC</th></tr>';
    data.entries.forEach(e => {
      const icon = e.is_dir ? '📁' : '📄';
      const ratio = e.ratio ? (e.ratio * 100).toFixed(1) + '%' : '-';
      const comp = e.compressed_size ? fmtSize(e.compressed_size) : '-';
      html += `<tr><td>${e.name}</td><td>${icon}</td><td>${fmtSize(e.size)}</td><td>${comp}</td><td>${ratio}</td><td class="text-muted">${e.crc || '-'}</td></tr>`;
    });
    html += '</table></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

// ══ Compress ═══════════════════════════════════════
async function doCompress() {
  const sourcesRaw = document.getElementById('cmp-sources').value;
  const output = document.getElementById('cmp-output').value;
  const password = document.getElementById('cmp-password').value || null;
  const volume = document.getElementById('cmp-volume').value || null;
  const format = document.getElementById('cmp-format').value;

  if (!sourcesRaw) { showToast('请选择源文件', 'error'); return; }
  if (!output) { showToast('请输入输出路径', 'error'); return; }

  const sources = sourcesRaw.split(',').map(s => s.trim()).filter(Boolean);
  const el = document.getElementById('cmp-result');
  el.innerHTML = '<div class="card"><div class="text-center text-muted">⏳ 压缩中...</div></div>';

  const data = await apiPost('/api/compress', {output, sources, password, volume});
  if (data.error) {
    el.innerHTML = `<div class="card"><span class="text-red">❌ ${data.error}</span></div>`;
    return;
  }

  let html = '<div class="card"><span class="text-green">✅ 压缩完成</span><div class="mt">';
  data.files.forEach(f => {
    html += `<div>📦 ${f.name} — ${fmtSize(f.size)}</div>`;
  });
  html += '</div></div>';
  el.innerHTML = html;
  showToast('压缩完成', 'success');
}

// ══ Crack ══════════════════════════════════════════
let _crackTaskId = null;
let _crackRunning = false;

async function doCrack() {
  const path = document.getElementById('crk-path').value;
  if (!path) { showToast('请输入压缩包路径', 'error'); return; }

  const method = document.getElementById('crk-method').value;
  const wordlist = document.getElementById('crk-wordlist').value || null;
  const charset = document.getElementById('crk-charset').value;
  const masksRaw = document.getElementById('crk-masks').value;
  const minLen = parseInt(document.getElementById('crk-minlen').value) || 1;
  const maxLen = parseInt(document.getElementById('crk-maxlen').value) || 6;
  const workers = parseInt(document.getElementById('crk-workers').value) || 4;
  const masks = masksRaw.split(',').map(s => s.trim()).filter(Boolean);

  document.getElementById('crk-progress').style.display = 'block';
  document.getElementById('crk-pbar').style.width = '0%';
  document.getElementById('crk-pstat').textContent = '⏳ 启动破解...';
  document.getElementById('crk-result').innerHTML = '';
  _crackRunning = true;

  const data = await apiPost('/api/crack/start', {path, method, wordlist, charset, min_len: minLen, max_len: maxLen, masks, workers});
  if (data.error) {
    document.getElementById('crk-result').innerHTML = `<div class="card"><span class="text-red">❌ ${data.error}</span></div>`;
    return;
  }

  _crackTaskId = data.task_id;

  // SSE 监听进度
  const evtSource = new EventSource(`/api/crack/progress/${_crackTaskId}`);
  evtSource.onmessage = function(event) {
    if (!_crackRunning) { evtSource.close(); return; }
    const state = JSON.parse(event.data);

    if (state.status === 'completed') {
      _crackRunning = false;
      evtSource.close();
      document.getElementById('crk-pbar').style.width = '100%';
      if (state.found) {
        document.getElementById('crk-pstat').textContent = `✅ 破解成功！密码: ${state.password} (尝试 ${state.attempts.toLocaleString()} 次, ${state.speed.toFixed(0)} pwd/s)`;
        document.getElementById('crk-result').innerHTML = `<div class="card"><span class="text-green" style="font-size:18px">✅ 破解成功！密码: <strong>${state.password}</strong></span>
        <div class="text-sm text-muted mt">尝试 ${state.attempts.toLocaleString()} 次 | 用时 ${state.elapsed.toFixed(1)}s | 速度 ${state.speed.toFixed(0)} pwd/s</div></div>`;
        showToast(`密码已找到: ${state.password}`, 'success');
      } else {
        document.getElementById('crk-pstat').textContent = '❌ 未找到密码';
        document.getElementById('crk-result').innerHTML = `<div class="card"><span class="text-red">❌ 未找到密码</span>
        <div class="text-sm text-muted mt">尝试 ${state.attempts.toLocaleString()} 次</div></div>`;
      }
      return;
    }

    if (state.status === 'error') {
      _crackRunning = false;
      evtSource.close();
      document.getElementById('crk-pstat').textContent = `❌ 错误: ${state.error}`;
      return;
    }

    // 更新进度
    const progress = state.total > 0 ? Math.min(100, (state.attempts / state.total) * 100) : 0;
    document.getElementById('crk-pbar').style.width = progress + '%';
    document.getElementById('crk-pstat').textContent =
      `🔍 尝试: ${state.attempts.toLocaleString()}${state.total ? ` / ${state.total.toLocaleString()}` : ''} | 当前: ${state.current || '-'} | 速度: ${state.speed.toFixed(0)} pwd/s`;
  };
}

function stopCrack() {
  _crackRunning = false;
  if (_crackTaskId) {
    document.getElementById('crk-pstat').textContent = '⏹ 已停止';
    showToast('破解已停止', 'info');
  }
}

// ══ Test ═══════════════════════════════════════════
async function doTest() {
  const path = document.getElementById('tst-path').value;
  const password = document.getElementById('tst-password').value || null;
  if (!path) { showToast('请输入压缩包路径', 'error'); return; }

  document.getElementById('tst-result').innerHTML = '<div class="card"><div class="text-muted">⏳ 校验中...</div></div>';
  const data = await apiPost('/api/test', {path, password});
  if (data.success) {
    document.getElementById('tst-result').innerHTML = `<div class="card"><span class="text-green">✅ 完整性校验通过</span></div>`;
  } else {
    let errs = data.errors ? data.errors.join('<br>') : '未知错误';
    document.getElementById('tst-result').innerHTML = `<div class="card"><span class="text-red">❌ 校验失败</span><div class="text-sm mt">${errs}</div></div>`;
  }
}

async function doBatchTest() {
  const pattern = document.getElementById('tst-batch').value;
  if (!pattern) { showToast('请输入通配符模式', 'error'); return; }

  document.getElementById('tst-batch-result').innerHTML = '<div class="card"><div class="text-muted">⏳ 批量校验中...</div></div>';
  const data = await apiPost('/api/batch/test', {pattern});
  let html = '<div class="card"><div class="card-title">批量校验结果</div><div class="table-wrap"><table><tr><th>文件</th><th>状态</th><th>详情</th></tr>';
  let passed = 0;
  data.results.forEach(r => {
    const ok = r.ok ? '✅ 通过' : '❌ 失败';
    if (r.ok) passed++;
    const err = r.errors && r.errors.length ? r.errors[0] : '-';
    html += `<tr><td>${r.src.split(/[\\/]/).pop()}</td><td>${ok}</td><td class="text-sm text-muted">${err}</td></tr>`;
  });
  html += `</table></div><div class="mt text-sm text-muted">${passed}/${data.results.length} 通过</div></div>`;
  document.getElementById('tst-batch-result').innerHTML = html;
}

// ══ Format auto-fill ═══════════════════════════════
document.getElementById('cmp-output').addEventListener('input', function() {
  const val = this.value.toLowerCase();
  const sel = document.getElementById('cmp-format');
  if (val.endsWith('.zip')) sel.value = 'zip';
  else if (val.endsWith('.7z')) sel.value = '7z';
  else if (val.endsWith('.tar.gz')) sel.value = 'tar.gz';
  else if (val.endsWith('.tar')) sel.value = 'tar';
});
